name: Deploy to Self-Hosted Server

on:
  push:
    branches:
      - main # Change this if your default branch is named 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: irfan       # 👈 Replace with your server's Linux username (e.g., ubuntu, root, dev)
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/sites/mongobite/food-delivery   
            git pull origin main
            npm install
            npm run build
            pm2 restart mongobite-backend